---
- name: 停止 Docker
  ansible.builtin.service:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
    enabled: "{{ item.enabled }}"
  with_items:
    - name: "docker"
      enabled: "no"
      state: "stopped"
  failed_when: false
  tags:
    - remove_docker
  when: common_is_linux_os

- name: 在 RedHat 上卸载 Docker
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: absent
    update_cache: true
  with_items:
    - docker-engine
    - docker-ce
    - docker-ce-cli
    - docker
    - docker-client
    - docker-client-latest
    - docker-common
    - docker-latest
    - docker-latest-logrotate
    - docker-logrotate
    - docker-selinux
    - docker-engine-selinux
    - docker-buildx-plugin
    - docker-compose-plugin
    - containerd.io
  tags:
    - remove_docker
  when: common_is_centos_os

- name: 在 Ubuntu 上卸载 Docker
  ansible.builtin.apt:
    pkg: "{{ item }}"
    state: absent
    update_cache: true
  with_items:
    - "docker"
    - "docker-io"
    - "docker.io"
    - "docker-ce"
    - "docker-ce-cli"
    - "docker-engine"
    - "containerd.io"
    - "containerd"
    - "runc"
  become: true
  become_method: ansible.builtin.sudo
  failed_when: false
  tags:
    - remove_docker
  when: common_is_ubuntu_os

- name: 在 macOS 上卸载 Docker 相关软件
  ansible.builtin.shell: "brew cask uninstall {{ item }}  --force || brew uninstall {{ item }} --force"
  changed_when: true
  with_items:
    - "docker"
    - "docker-machine"
    - "docker-compose"
    - "docker-completion"
    - "docker-compose-completion"
    - "docker-machine-completion"
  failed_when: false
  tags:
    - remove_docker
  when: common_is_mac_os

- name: 删除 Docker 目录
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
    force: true
  with_items:
    - "/var/lib/docker"
    - "/var/run/docker"
    - "/run/docker"
    - "/etc/docker"
    - "/usr/libexec/docker"
    - "/etc/apparmor.d/docker"
    - "/etc/yum.repos.d/docker-ce.repo"
    - "/var/run/docker.sock"
    - "/usr/local/bin/docker-compose"
    - "{{ common_home_root }}/Library/Caches/com.docker.docker"
    - "{{ common_home_root }}/Library/Containers/com.docker.docker"
    - "{{ common_home_root }}/Library/Containers/com.docker.helper"
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - remove_docker
