- name: Create rancher dir
  ansible.builtin.file:
    dest: "/etc/rancher/k3s"
    state: directory
    mode: "0755"
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os

- name: 复制 k3s 配置文件
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/rancher/k3s"
    mode: "0644"
    force: true
  with_items:
    - kube-config.yaml
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os

- name: "删除旧的iptables"
  ansible.builtin.command: "update-alternatives --remove {{ item }} /usr/local/sbin/{{ item }}"
  with_items:
    - iptables
    - ip6tables
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  changed_when: false
  failed_when: false
  when: common_is_linux_os

- name: 在 RedHat 上安装 k3s-selinux
  ansible.builtin.dnf:
    name: https://github.com/k3s-io/k3s-selinux/releases/download/v1.6.latest.1/k3s-selinux-1.6-1.el7.noarch.rpm
    state: present
    disable_gpg_check: true
  tags:
    - k3s_common
  failed_when: false
  when: common_is_centos_os

- name: 复制 k3s server 配置文件
  ansible.builtin.copy:
    src: "server-config.yaml"
    dest: "/etc/rancher/k3s/config.yaml"
    mode: "0644"
    force: true
  tags:
    - k3s_server
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os

- name: "设置安装k3s-server命令"
  ansible.builtin.set_fact:
    # https://update.k3s.io/v1-release/channels/stable
    # INSTALL_K3S_VERSION=v1.25.7+k3s1 --extra-vars 'INSTALL_K3S_EXTRA="--kube-apiserver-arg service-node-port-range=1-65000 --kube-apiserver-arg default-not-ready-toleration-seconds=10 --kube-apiserver-arg default-unreachable-toleration-seconds=10 --node-label worker.node=true"'
    k3s_server_cmd: "curl -sfL https://rancher-mirror.rancher.cn/k3s/k3s-install.sh | INSTALL_K3S_VERSION={{ INSTALL_K3S_VERSION | default('') }} INSTALL_K3S_MIRROR=cn
      INSTALL_K3S_EXEC='server --docker {{ INSTALL_K3S_EXTRA | default('') }}' sh -s -"
  tags:
    - k3s_server
  when: common_is_linux_os and common_is_master_node

- name: "输出安装k3s-server命令"
  ansible.builtin.debug:
    msg: "{{ k3s_server_cmd }}"
  tags:
    - k3s_server
  when: common_is_linux_os and common_is_master_node and k3s_server_cmd is defined

- name: 在 Linux 上安装 k3s server
  ansible.builtin.shell: |
    set -o pipefail
    {{ k3s_server_cmd }}
  args:
    executable: /bin/bash
  register: k3s_install_result
  changed_when: true
  tags:
    - k3s_server
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os and common_is_master_node

- name: "输出安装信息"
  ansible.builtin.debug:
    msg: "{{ k3s_install_result }}"
  tags:
    - k3s_server
  when: common_is_linux_os and common_is_master_node

- name: 在 Linux 上启动 k3s
  ansible.builtin.service:
    name: "k3s"
    state: "started"
    enabled: "yes"
  register: k3s_service_result
  failed_when: false
  tags:
    - k3s_server
  when: common_is_linux_os and common_is_master_node

# 安装后 helm-install-traefik 的状态会是 Completed
- name: "查询节点、Pod状态"
  ansible.builtin.command: "{{ item }}"
  register: k3s_pods_info
  changed_when: false
  with_items:
    - /usr/local/bin/kubectl get nodes,cs -o wide
    - /usr/local/bin/kubectl --namespace kube-system get pods -o wide
    - /usr/local/bin/kubectl get all --all-namespaces
  tags:
    - k3s_server
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os and common_is_master_node

- name: "输出Pod信息"
  ansible.builtin.debug:
    msg: "{{ k3s_pods_info }}"
  tags:
    - k3s_server
  when: common_is_linux_os and common_is_master_node

- name: 检查 stern 是否已安装
  ansible.builtin.shell: "stern --version >/dev/null 2>&1 && echo 0 || echo 1"
  register: k3s_installed_of_stern
  changed_when: false
  tags:
    - stern
  when: common_is_linux_os and common_is_master_node

- name: 输出 stern 检查结果
  ansible.builtin.debug:
    msg: "stern {{ '已安装' if k3s_installed_of_stern.stdout == '0' else '未安装' }}"
  tags:
    - stern
  when: common_is_linux_os and common_is_master_node

- name: 安装 stern
  tags:
    - stern

  block:
    - name: 检查 Linux 上是否已有 stern 安装包
      ansible.builtin.stat:
        path: "{{ k3s_stern_package_path_on_linux }}"
      register: k3s_stern_package_linux_stat
      changed_when: false
      when: (common_is_linux_os) and k3s_installed_of_stern.stdout == "1"

    - name: 输出 Linux stern 安装包检查结果
      ansible.builtin.debug:
        msg: "Linux stern 安装包 {{ '已存在' if k3s_stern_package_linux_stat.stat.exists else '不存在' }}"
      when: (common_is_linux_os) and k3s_installed_of_stern.stdout == "1"

    - name: 在 Linux 上下载 stern 安装包
      ansible.builtin.get_url:
        url: "{{ k3s_stern_download_url_on_linux }}"
        dest: "{{ k3s_stern_package_path_on_linux }}"
        force: false
        mode: "0644"
      when: common_is_linux_os and common_is_master_node and k3s_installed_of_stern.stdout == "1" and not k3s_stern_package_linux_stat.stat.exists
    - name: 在 Linux 上解压 stern
      ansible.builtin.unarchive:
        src: "{{ k3s_stern_package_path_on_linux }}"
        dest: "/tmp"
        remote_src: true
      when: common_is_linux_os and common_is_master_node and k3s_installed_of_stern.stdout == "1"
    - name: 复制 stern
      ansible.builtin.copy:
        src: "/tmp/stern"
        dest: "/usr/local/bin"
        mode: "0755"
        force: true
        remote_src: true
      when: common_is_linux_os and common_is_master_node and k3s_installed_of_stern.stdout == "1"
- name: 检查 Linux 上是否已有 helm 安装包
  ansible.builtin.stat:
    path: "{{ k3s_helm_package_path_on_linux }}"
  register: k3s_helm_package_linux_stat
  changed_when: false
  tags:
    - helm
  when: common_is_linux_os and common_is_master_node

- name: 输出 Linux helm 安装包检查结果
  ansible.builtin.debug:
    msg: "Linux helm 安装包 {{ '已存在' if k3s_helm_package_linux_stat.stat.exists else '不存在' }}"
  tags:
    - helm
  when: common_is_linux_os and common_is_master_node

- name: 检查 helm 是否已安装
  ansible.builtin.shell: "helm version >/dev/null 2>&1 && echo 0 || echo 1"
  register: k3s_installed_of_helm
  changed_when: false
  tags:
    - helm
  when: common_is_linux_os and common_is_master_node

- name: 输出 helm 检查结果
  ansible.builtin.debug:
    msg: "helm {{ '已安装' if k3s_installed_of_helm.stdout == '0' else '未安装' }}"
  tags:
    - helm
  when: common_is_linux_os and common_is_master_node

- name: 安装 helm
  tags:
    - helm

  block:
    - name: 在 Linux 上下载 helm 安装包
      ansible.builtin.get_url:
        url: "{{ k3s_helm_download_url_on_linux }}"
        dest: "{{ k3s_helm_package_path_on_linux }}"
        force: false
        mode: "0644"
      when: common_is_linux_os and common_is_master_node and not k3s_helm_package_linux_stat.stat.exists

    - name: 在 Linux 上解压 helm
      ansible.builtin.unarchive:
        src: "{{ k3s_helm_package_path_on_linux }}"
        dest: "/tmp"
        remote_src: true
      when: common_is_linux_os and common_is_master_node and k3s_installed_of_helm.stdout == "1"

    - name: 复制 helm
      ansible.builtin.copy:
        src: "/tmp/linux-amd64/helm"
        dest: "/usr/local/bin"
        mode: "0755"
        force: true
        remote_src: true
      when: common_is_linux_os and common_is_master_node
- name: 添加 helm 仓库
  ansible.builtin.shell: |
    set -o pipefail
    helm repo remove stable || true
    helm repo add stable https://kubernetes.oss-cn-hangzhou.aliyuncs.com/charts
    helm repo update
  args:
    executable: /bin/bash
  register: k3s_helm_repo_info
  changed_when: true
  tags:
    - helm
  when: common_is_linux_os and common_is_master_node

- name: 查询 helm 发布列表
  ansible.builtin.command: helm list --all-namespaces
  register: k3s_helm_release_info
  changed_when: false
  failed_when: false
  tags:
    - helm
  when: common_is_linux_os and common_is_master_node

- name: "输出 helm 仓库信息"
  ansible.builtin.debug:
    msg:
      repo: "{{ k3s_helm_repo_info }}"
      releases: "{{ k3s_helm_release_info }}"
  tags:
    - helm
  when: common_is_linux_os and common_is_master_node
