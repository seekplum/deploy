---
- name: "Ubuntu关闭防火墙"
  ansible.builtin.service:
    name: "ufw"
    state: "stopped"
    enabled: "no"
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

- name: "RedHat关闭防火墙"
  ansible.builtin.service:
    name: "firewalld"
    state: "stopped"
    enabled: "no"
  tags:
    - k3s_common
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_centos_os

- name: "临时关闭交换分区"
  ansible.builtin.command: swapoff -a
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  changed_when: false
  when: common_is_linux_os

- name: "Linux获取交换分区名字"
  ansible.builtin.command: awk '$3 == "swap" {print $1}' /etc/fstab
  register: k3s_swap_name
  changed_when: false
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os

- name: 输出 Linux 交换分区检查结果
  ansible.builtin.debug:
    msg: "Linux 交换分区 {{ k3s_swap_name.stdout | default('') if (k3s_swap_name.stdout | default('')) != '' else '不存在' }}"
  tags:
    - k3s_common
  when: common_is_linux_os

- name: "Linux永久关闭交换分区"
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: "^({{ k3s_swap_name.stdout }})"
    replace: "# \\1"
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os and "stdout" in k3s_swap_name and k3s_swap_name.stdout | length > 0 and not k3s_swap_name.stdout.startswith("#")

- name: "Ubuntu添加阿里源"
  ansible.builtin.apt_key:
    url: https://mirrors.aliyun.com/kubernetes/apt/doc/apt-key.gpg
    state: present
  changed_when: false
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

- name: "Ubuntu修改k8s源内容"
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    mode: "0644"
    content: |
      deb https://mirrors.aliyun.com/kubernetes/apt/ kubernetes-xenial main
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

- name: "RedHat添加阿里源"
  ansible.builtin.shell:
    cmd: |
      cat >/etc/yum.repos.d/kubernetes.repo<<EOF
      [kubernetes]
      name=kubernetes
      baseurl=https://mirrors.aliyun.com/kubernetes/yum/repos/kubernetes-el7-x86_64/
      gpgcheck=0
      enable=1
      EOF
  changed_when: false
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - k3s_common
  when: common_is_centos_os

- name: "Linux配置k8s内核参数"
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      vm.swappiness=0
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  changed_when: false
  when: common_is_linux_os

- name: "Linux生效内核参数"
  ansible.builtin.command: sysctl --system
  changed_when: false
  tags:
    - k3s_common
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_linux_os

