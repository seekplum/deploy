---
- name: 检查 Docker 是否已安装
  ansible.builtin.shell: '(command -v docker >/dev/null 2>&1 || test -x "{{ common_home_root }}/.lima/.bin/docker") && echo 0 || echo 1'
  register: install_installed_of_docker
  changed_when: false
  tags:
    - docker_check

- name: 输出 Docker 检查结果
  ansible.builtin.debug:
    msg: "Docker {{ '已安装' if install_installed_of_docker.stdout == '0' else '未安装' }}"
  tags:
    - docker_check

- name: 检查 docker-machine 是否已安装
  ansible.builtin.shell: "docker-machine --version >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_installed_of_docker_machine
  changed_when: false
  tags:
    - docker_check

- name: 输出 docker-machine 检查结果
  ansible.builtin.debug:
    msg: "docker-machine {{ '已安装' if install_installed_of_docker_machine.stdout == '0' else '未安装' }}"
  tags:
    - docker_machine

- name: 检查 docker-compose 是否已安装
  ansible.builtin.shell: "docker-compose --version >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_installed_of_docker_compose
  changed_when: false
  tags:
    - docker_compose

- name: 输出 docker-compose 检查结果
  ansible.builtin.debug:
    msg: "docker-compose {{ '已安装' if install_installed_of_docker_compose.stdout == '0' else '未安装' }}"
  tags:
    - docker_compose

- name: "CentOS 清理旧 Docker YUM 源"
  ansible.builtin.command: "rm -f /etc/yum.repos.d/docker-ce.repo"
  tags:
    - docker_repo
  changed_when: true
  when: common_is_centos_os and install_installed_of_docker.stdout == "1"

- name: "CentOS 配置 Docker 软件源"
  ansible.builtin.import_tasks: ../../common/tasks/docker-repo.yml
  tags:
    - docker_repo
  when: common_is_centos_os and install_installed_of_docker.stdout == "1"

# 安装containerd
# yum install https://download.docker.com/linux/centos/8/x86_64/stable/Packages/containerd.io-1.6.9-3.1.el8.x86_64.rpm

# 安装container-selinux
# yum install https://rpmfind.net/linux/centos/8-stream/AppStream/x86_64/os/Packages/
# container-selinux-2.124.0-1.gitf958d0c.module_el8.4.0+521+9df8e6d3.noarch.rpm

# 安装docker-ce-rootless-extras
# yum install https://download.docker.com/linux/centos/8/x86_64/stable/Packages/
# docker-ce-rootless-extras-20.10.0-3.el8.x86_64.rpm

# almalinux 9 docker 无法启动https://github.com/docker/cli/issues/2104
# 编辑 /etc/default/grub 设置 GRUB_CMDLINE_LINUX="console=tty0 console=ttyS0,115200n8 no_timer_check biosdevname=0 net.ifnames=0 cgroup_enable=memory swapaccount=1 systemd.unified_cgroup_hierarchy=0"
# dnf install -y grubby && grubby --update-kernel=ALL --args="systemd.unified_cgroup_hierarchy=0"
# reboot
- name: 在 Redhat 上安装 Docker
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
    update_cache: true
    nobest: true
  # yum list docker-ce --showduplicates | grep "^docker" | sort -r
  with_items:
    - docker-ce-cli{{ DOCKER_CLI_VERSION | default('') }}
    - docker-ce{{ DOCKER_VERSION | default('') }}
  tags:
    - docker_install
  when: common_is_centos_os and install_installed_of_docker.stdout == "1"

- name: "Ubuntu 清理旧版 Docker 包"
  ansible.builtin.apt:
    name:
      - docker
      - docker.io
      - docker-doc
      - docker-compose
      - docker-compose-v2
      - podman-docker
      - containerd
      - runc
    state: absent
    autoremove: true
    purge: true
  tags:
    - docker_install
  become: true
  become_method: ansible.builtin.sudo
  failed_when: false
  when: common_is_ubuntu_os and install_installed_of_docker.stdout == "1"

- name: "Ubuntu 配置 Docker 软件源"
  ansible.builtin.import_tasks: ../../common/tasks/docker-repo.yml
  vars:
    common_docker_apt_mirror: https://download.docker.com/linux/ubuntu
  tags:
    - docker_repo
  when: common_is_ubuntu_os and install_installed_of_docker.stdout == "1"

- name: 在 Ubuntu 上安装 Docker
  ansible.builtin.apt:
    pkg: "{{ item }}"
    state: present
    # update_cache: true
  # sudo apt-cache madison docker-ce
  with_items:
    - docker-ce-cli{{ DOCKER_CLI_VERSION | default('') }}
    - docker-ce{{ DOCKER_VERSION | default('') }}
    - containerd.io{{ CONTAINERD_VERSION | default('') }}
  tags:
    - docker_install
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os and install_installed_of_docker.stdout == "1"

- name: 在 macOS 上安装 Docker
  ansible.builtin.shell: "brew list --cask docker >/dev/null 2>&1 || brew install --cask docker"
  register: install_docker_macos_result
  changed_when: install_docker_macos_result.rc == 0 and install_docker_macos_result.stdout != ""
  tags:
    - docker_install
  when: common_is_mac_os and install_installed_of_docker.stdout == "1"

- name: 检查 macOS Docker Desktop 是否存在
  ansible.builtin.stat:
    path: /Applications/Docker.app
  register: install_macos_docker_desktop_app
  tags:
    - docker_desktop
  when: common_is_mac_os

- name: 输出 macOS Docker Desktop 检查结果
  ansible.builtin.debug:
    msg: "macOS Docker Desktop {{ '已存在' if install_macos_docker_desktop_app.stat.exists else '不存在' }}"
  tags:
    - docker_desktop
  when: common_is_mac_os

- name: 在 macOS 上安装 docker-machine
  ansible.builtin.command: "brew install docker-machine"
  changed_when: true
  tags:
    - docker_machine
  when: common_is_mac_os and install_installed_of_docker_machine.stdout == "1"

- name: 在 macOS 上安装 docker-compose
  ansible.builtin.command: "brew install docker-compose"
  changed_when: true
  tags:
    - docker_compose
  when: common_is_mac_os and install_installed_of_docker_compose.stdout == "1"

- name: 输出 Linux docker-compose 下载链接
  ansible.builtin.debug:
    msg: "{{ install_docker_compose_download_url }}"
  tags:
    - docker_compose
  when: common_is_linux_os and install_installed_of_docker_compose.stdout == "1"

- name: 检查 Linux docker-compose 是否已存在
  ansible.builtin.stat:
    path: /usr/local/bin/docker-compose
  register: install_docker_compose_binary_stat
  changed_when: false
  tags:
    - docker_compose
  when: common_is_linux_os and install_installed_of_docker_compose.stdout == "1"

- name: 输出 Linux docker-compose 检查结果
  ansible.builtin.debug:
    msg: "Linux docker-compose 二进制 {{ '已存在' if install_docker_compose_binary_stat.stat.exists else '不存在' }}"
  tags:
    - docker_compose
  when: common_is_linux_os and install_installed_of_docker_compose.stdout == "1"

- name: 在 Linux 上安装 docker-compose
  ansible.builtin.get_url:
    url: "{{ install_docker_compose_download_url }}"
    dest: /usr/local/bin/docker-compose
    mode: "0755"
    force: false
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - docker_compose
  when:
    - common_is_linux_os
    - install_installed_of_docker_compose.stdout == "1"
    - not install_docker_compose_binary_stat.stat.exists

- name: 在 Ubuntu 或 Redhat 上启动 Docker
  ansible.builtin.service:
    name: "docker"
    state: "started"
    enabled: true
  register: install_docker_service_result
  failed_when: false
  tags:
    - docker_service
  when: common_is_linux_os

- name: 在 Linux 上备份 Docker daemon.json
  ansible.builtin.copy:
    src: /etc/docker/daemon.json
    dest: "/etc/docker/daemon.json.{{ install_backup_date }}.{{ install_backup_epoch }}"
    remote_src: true
    mode: preserve
  changed_when: false
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - docker_daemon_config
  when: common_is_linux_os

- name: "Linux修改docker启动配置"
  ansible.builtin.copy:
    src: daemon.json
    dest: /etc/docker/daemon.json
    mode: "0644"
    force: true
  tags:
    - docker_daemon_config
  when: common_is_linux_os

- name: 检查 macOS Docker daemon.json 是否存在
  ansible.builtin.stat:
    path: "{{ common_home_root }}/.docker/daemon.json"
  register: install_macos_docker_daemon_config
  tags:
    - docker_daemon_config
  when:
    - common_is_mac_os
    - install_macos_docker_desktop_app.stat.exists

- name: 输出 macOS Docker daemon.json 检查结果
  ansible.builtin.debug:
    msg: "macOS Docker daemon.json {{ '已存在' if install_macos_docker_daemon_config.stat.exists else '不存在' }}"
  tags:
    - docker_daemon_config
  when:
    - common_is_mac_os
    - install_macos_docker_desktop_app.stat.exists

- name: 在 macOS 上备份 Docker daemon.json
  ansible.builtin.copy:
    src: "{{ common_home_root }}/.docker/daemon.json"
    dest: "{{ common_home_root }}/.docker/daemon.json.{{ install_backup_date }}.{{ install_backup_epoch }}"
    remote_src: true
    mode: preserve
  changed_when: false
  failed_when: false
  tags:
    - docker_daemon_config
  when:
    - common_is_mac_os
    - install_macos_docker_desktop_app.stat.exists
    - install_macos_docker_daemon_config.stat.exists

- name: "MacOS修改docker启动配置"
  ansible.builtin.copy:
    src: mac-daemon.json
    dest: "{{ common_home_root }}/.docker/daemon.json"
    mode: "0644"
    force: true
  tags:
    - docker_daemon_config
  when:
    - common_is_mac_os
    - install_macos_docker_desktop_app.stat.exists

- name: "MacOS重启Docker"
  ansible.builtin.shell: osascript -e 'quit app "Docker"' && open -a Docker
  changed_when: true
  tags:
    - docker_daemon_config
  when:
    - common_is_mac_os
    - install_macos_docker_desktop_app.stat.exists
