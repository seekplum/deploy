---
- name: 设置备份时间戳变量
  ansible.builtin.set_fact:
    install_backup_date: "{{ lookup('pipe', 'date +%Y%m%d') }}"
    install_backup_epoch: "{{ lookup('pipe', 'date +%s') }}"
  tags:
    - always

- name: 安装 install 角色的 shell 包装器
  ansible.builtin.copy:
    dest: /tmp/ansible-shell-wrapper
    mode: "0755"
    content: |
      #!/bin/sh
      if [ "$1" = "-c" ]; then
        shift
        if command -v zsh >/dev/null 2>&1; then
          exec "$(command -v zsh)" -i -c "$1"
        fi
        exec /bin/sh -c "$1"
      fi
      exec /bin/sh "$@"
  tags:
    - always

- name: 使用可用的 zsh 包装器执行 install 角色任务
  module_defaults:
    ansible.builtin.shell:
      executable: /tmp/ansible-shell-wrapper
  block:
    - name: 执行 configure 任务
      ansible.builtin.import_tasks: configure.yml
      tags:
        - configure

    - name: 执行 initialize 任务
      ansible.builtin.import_tasks: initialize.yml
      tags:
        - initialize

    - name: 执行 zsh 任务
      ansible.builtin.import_tasks: zsh.yml
      tags:
        - zsh

    - name: 执行 Python 任务
      ansible.builtin.import_tasks: python.yml
      tags:
        - python

    - name: 执行 virtualenv 任务
      ansible.builtin.import_tasks: virtualenv.yml
      tags:
        - virtualenv

    - name: 执行 Docker 任务
      ansible.builtin.import_tasks: docker.yml
      tags:
        - docker

    - name: 执行 Golang 任务
      ansible.builtin.import_tasks: golang.yml
      tags:
        - golang

    - name: 执行 Java 任务
      ansible.builtin.import_tasks: java.yml
      tags:
        - java

    - name: 执行 Node.js 任务
      ansible.builtin.import_tasks: nodejs.yml
      tags:
        - nodejs

    - name: 执行 rbenv 任务
      ansible.builtin.import_tasks: rbenv.yml
      tags:
        - rbenv
