---
- name: 检查 rbenv 是否已安装
  ansible.builtin.shell: "test -d {{ install_rbenv_root }} && echo 0 || echo 1"
  register: install_installed_of_rbenv
  changed_when: false
  tags:
    - rbenv

- name: 下载 rbenv
  ansible.builtin.git:
    repo: "{{ install_rbenv_repository }}"
    dest: "{{ install_rbenv_root }}"
    accept_hostkey: true
    version: master
  when: install_installed_of_rbenv.stdout == "1"
  tags:
    - rbenv

- name: 更新 rbenv
  when: install_installed_of_rbenv.stdout == "0"
  tags:
    - rbenv

  block:
    - name: 设置仓库远程地址
      community.general.git_config:
        repo: "{{ install_rbenv_root }}"
        scope: "local"
        name: "remote.origin.url"
        value: "{{ install_rbenv_repository }}"
    - name: 拉取仓库更新
      ansible.builtin.git:
        repo: "{{ install_rbenv_repository }}"
        dest: "{{ install_rbenv_root }}"
        update: true
        version: master
- name: 检查 rbenv 插件是否已安装
  ansible.builtin.shell: "test -d {{ install_rbenv_root }}/plugins/ruby-build && echo 0 || echo 1"
  register: install_installed_of_rbenv_plugins
  changed_when: false
  tags:
    - rbenv

- name: 下载 rbenv 插件
  ansible.builtin.git:
    repo: "{{ install_ruby_build_repository }}"
    dest: "{{ install_ruby_build_root }}"
    accept_hostkey: true
    version: master
  when: install_installed_of_rbenv_plugins.stdout == "1"
  tags:
    - rbenv

- name: 更新 rbenv 插件
  when: install_installed_of_rbenv.stdout == "0"
  tags:
    - rbenv

  block:
    - name: 设置仓库远程地址
      community.general.git_config:
        repo: "{{ install_ruby_build_root }}"
        scope: "local"
        name: "remote.origin.url"
        value: "{{ install_ruby_build_repository }}"
    - name: 拉取仓库更新
      ansible.builtin.git:
        repo: "{{ install_ruby_build_repository }}"
        dest: "{{ install_ruby_build_root }}"
        update: true
        version: master
- name: 获取系统 Ruby 版本
  ansible.builtin.shell: |
    set -o pipefail
    ruby --version 2>/dev/null | awk '{print $2}' | cut -d'p' -f1 || true
  args:
    executable: /bin/bash
  register: install_dynamic_ruby_version
  changed_when: false
  tags:
    - rbenv

- name: 设置 Ruby 版本
  ansible.builtin.set_fact:
    # install_ruby_version: "{{ install_dynamic_ruby_version.stdout | default('2.7.7', true) }}"
    install_ruby_version: "3.2.0"
  tags:
    - rbenv

- name: 检查 Ruby 是否已安装
  ansible.builtin.shell: "ruby --version >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_installed_of_ruby
  changed_when: false
  tags:
    - rbenv

- name: 安装 Ruby
  ansible.builtin.command: "{{ install_rbenv_root }}/bin/rbenv install {{ install_ruby_version }} --skip-existing"
  changed_when: true
  tags:
    - rbenv
  when: install_installed_of_ruby.stdout == "1"

- name: 设置全局 Ruby 版本
  ansible.builtin.command: "{{ install_rbenv_root }}/bin/rbenv global {{ install_ruby_version }} --skip-existing"
  changed_when: true
  tags:
    - rbenv
  when: install_installed_of_ruby.stdout == "1"
