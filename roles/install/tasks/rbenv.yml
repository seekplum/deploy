---
- name: check rbenv installed
  shell: "test -d {{ RBENV_ROOT }} && echo 0 || echo 1"
  register: installed_of_rbenv
  changed_when: false
  tags:
    - rbenv

- name: download rbenv
  git:
    repo: "{{ RBENV_REPOSITORY }}"
    dest: "{{ RBENV_ROOT }}"
    accept_hostkey: true
  when: installed_of_rbenv.stdout == "1"
  tags:
    - rbenv

- name: pull rbenv
  block:
    - name: repository set-url
      git_config:
        repo: "{{ RBENV_ROOT }}"
        scope: "local"
        name: "remote.origin.url"
        value: "{{ RBENV_REPOSITORY }}"
    - name: pull repository
      git:
        repo: "{{ RBENV_REPOSITORY }}"
        dest: "{{ RBENV_ROOT }}"
        update: true
        version: master
  when: installed_of_rbenv.stdout == "0"
  tags:
    - rbenv

- name: check rbenv plugins installed
  shell: "test -d {{ RBENV_ROOT }}/plugins/ruby-build && echo 0 || echo 1"
  register: installed_of_rbenv_plugins
  changed_when: false
  tags:
    - rbenv

- name: download rbenv plugins
  git:
    repo: "{{ RUBY_BUILD_REPOSITORY }}"
    dest: "{{ RUBY_BUILD_ROOT }}"
    accept_hostkey: true
  when: installed_of_rbenv_plugins.stdout == "1"
  tags:
    - rbenv

- name: pull rbenv plugins
  block:
    - name: repository set-url
      git_config:
        repo: "{{ RUBY_BUILD_ROOT }}"
        scope: "local"
        name: "remote.origin.url"
        value: "{{ RUBY_BUILD_REPOSITORY }}"
    - name: pull repository
      git:
        repo: "{{ RUBY_BUILD_REPOSITORY }}"
        dest: "{{ RUBY_BUILD_ROOT }}"
        update: true
        version: master
  when: installed_of_rbenv.stdout == "0"
  tags:
    - rbenv

- name: get system ruby version
  shell: |
    ruby --version 2>/dev/null | awk '{print $2}' | cut -d'p' -f1 || true
  register: dynamic_ruby_version
  changed_when: false
  tags:
    - rbenv

- name: set rube version
  set_fact:
    # ruby_version: "{{ dynamic_ruby_version.stdout | default('2.7.7', true) }}"
    ruby_version: "3.2.0"
  tags:
    - rbenv

- name: install ruby
  shell: "{{ RBENV_ROOT }}/bin/rbenv install {{ ruby_version }} --skip-existing"
  tags:
    - rbenv

- name: set global ruby
  shell: "{{ RBENV_ROOT }}/bin/rbenv global {{ ruby_version }} --skip-existing"
  tags:
    - rbenv
