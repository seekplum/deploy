- name: 在 Redhat 上添加 EPEL RPM-GPG 密钥
  ansible.builtin.command: sudo curl -fSL --connect-timeout 5 --retry 100 --retry-connrefused --retry-delay 1 --retry-max-time 100
    https://archive.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }} -o /etc/pki/rpm-gpg/RPM-GPG-KEY-EPEL-{{
    ansible_distribution_major_version }}
  tags:
    - initialize
  failed_when: false
  changed_when: false
  when: common_is_centos_os

- name: 在 Redhat 上安装基础软件包
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
    update_cache: true
    # nobest: true
  with_items:
    # - python2-pip
    - python3-pip
    - zip
    - unzip
    # - util-linux-user
    - epel-release
    - gcc
    - gcc-c++
    - zlib
    - zlib-devel
    - libffi-devel
    - sqlite-devel
    - readline-devel
    - rsync
    - git
    - bzip2
    - bzip2-devel
    #    - python-setuptools
    #    - python-devel
    - wget
    - screen
    - make
    - cmake
    - tree
    - sshpass
    - openssl-devel
    - openssl11
    - openssl11-devel
    - yum-utils
    - device-mapper-persistent-data
    - lvm2
    # - haveged
    # - the_silver_searcher
    - patch
    - pcre-devel
    - ripgrep
    - knot
  tags:
    - initialize
  when: common_is_centos_os

