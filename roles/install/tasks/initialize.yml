- name: 安装 MongoDB 6.0 GPG 密钥
  ansible.builtin.shell: |
    set -o pipefail
    if [ -f /usr/share/keyrings/mongodb-server-6.0.gpg ]; then
      echo "server-6.0.asc exists"
    else
      curl -fsSL https://www.mongodb.org/static/pgp/server-6.0.asc |
        sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-6.0.gpg
    fi
  args:
    executable: /bin/bash
  tags:
    - initialize
  register: install_mongodb_gpg_key_result
  changed_when: "'server-6.0.asc exists' not in install_mongodb_gpg_key_result.stdout"
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

- name: 安装缺失的 GPG 公钥
  ansible.builtin.apt_key:
    keyserver: keyserver.ubuntu.com
    id: "{{ item }}"
  loop:
    - E363C90F8F1B6217
    - A1715D88E1DF1F24
  tags:
    - initialize
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

- name: 在 Ubuntu 上安装基础软件包
  ansible.builtin.apt:
    pkg:
      - curl
      - jq
      - gcc
      - rsync
      - git
      - bzip2
      - python3-setuptools
      - python3-dev
      - wget
      - screen
      - make
      - cmake
      - tree
      - sshpass
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - llvm
      - libncurses5-dev
      - software-properties-common
      - haveged
      - silversearcher-ag
      - apt-transport-https
      # - ca-certificates
      - gnupg-agent
      - gnupg2
      - python3-apt
      - libffi-dev
      - python3
      - python3-pip
      - pinentry-gtk2
      - python3-tk
      - tk-dev
      - libpcre3-dev
      - ripgrep
      - mongodb-mongosh
      - knot-dnsutils
      - keychain
      - sqlite3
      - groovy
      - shfmt
      - shellcheck
      - unzip
      - age
      - certbot
      - python3-certbot-nginx
      - rbenv
      - libyaml-dev
    state: present
    update_cache: true
    cache_valid_time: 86400
  tags:
    - initialize
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

- name: 在 macOS 上安装 xcode-select
  ansible.builtin.shell: "xcode-select -v >/dev/null 2>&1 || xcode-select --install"
  register: install_xcode_select_result
  changed_when: install_xcode_select_result.rc == 0 and install_xcode_select_result.stdout != ""
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os

- name: 清除 brew 残留锁 & 临时文件
  ansible.builtin.shell: |
    rm -rf ~/Library/Caches/Homebrew/*.incomplete
    rm -rf ~/Library/Caches/Homebrew/*.lock
    rm -rf /private/tmp/.brew_lock
    brew cleanup --force 2>/dev/null ||
    pkill -f "brew install" 2>/dev/null || true
    pkill -f "brew" 2>/dev/null || true
  changed_when: false
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root"

- name: 信任brew源
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop:
    - farion1231/ccswitch
    - mongodb/brew
    - sunnyyoung/tap
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root"

- name: 在 macOS 上安装基础软件包
  community.general.homebrew:
    name:
      - wget
      - tree
      - zlib
      - sqlite
      - the_silver_searcher
      - gnupg
      - pinentry-mac
      - ripgrep
      - age
      - shfmt
      - shellcheck
      - esolitos/ipa/sshpass
      - knot
      - go
      - zulu@8
      - lua
      - maccy
      - mongodb-community
      - redis
      - lima
      - showkey
      - sunnyyoung/tap/wechattweak
      - yamlfmt
      - kubernetes-cli
    state: present
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root"

- name: 检查 macOS Cask 应用是否已存在
  ansible.builtin.stat:
    path: "{{ item.app_path }}"
  loop:
    - name: cc-switch
      install_name: farion1231/ccswitch/cc-switch
      app_path: "/Applications/CC Switch.app"
    - name: warp
      install_name: warp
      app_path: "/Applications/Warp.app"
  register: install_macos_cask_apps
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root"

- name: 在 macOS 上安装 Cask 软件包
  ansible.builtin.shell: |
    brew list --cask "{{ item.item.name }}" >/dev/null 2>&1 ||
      brew install --cask "{{ item.item.install_name }}"
  loop: "{{ install_macos_cask_apps.results }}"
  changed_when: "'Installing' in install_cask_install_result.stdout or 'Installing' in install_cask_install_result.stderr"
  failed_when:
    - install_cask_install_result.rc != 0
    - "'already an App at' not in install_cask_install_result.stderr"
  register: install_cask_install_result
  tags:
    - initialize
  when:
    - common_is_mac_os and ansible_user_id != "root"
    - not item.stat.exists

# 1. 访问 https://www.macports.org/install.php 安装 MacPorts，安装完成后执行以下命令更换 MacPorts 镜像源
# 2. /opt/local/etc/macports/sources.conf 注释掉 rsync://rsync. 开头部分，换成下方 https 链接
# https://mirrors.tuna.tsinghua.edu.cn/macports/release/ports.tar.gz [default]
# 3. /opt/local/etc/macports/macports.conf 更改如下配置
# preferred_hosts         mirrors.ustc.edu.cn
# rsync_server            mirrors.ustc.edu.cn
# 4. 更新 MacPorts 镜像源
# sudo -E port -d selfupdate
- name: 检查 MacPorts 是否已安装
  ansible.builtin.shell: "command -v port >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_macports_installed
  changed_when: false
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root"

- name: 在 macOS 上通过 MacPorts 安装软件包
  ansible.builtin.shell: |
    set -o pipefail
    if [ "$(port installed | grep -c "{{ item }}")" = "0" ]; then
      sudo port -N install "{{ item }}"
      sudo port load "{{ item }}"
    else
      echo "{{ item }} is installed"
    fi
  args:
    executable: /bin/bash
  with_items:
    - knot
  register: install_macports_package_result
  changed_when: "'is installed' not in install_macports_package_result.stdout"
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root" and install_macports_installed.stdout == "0"

- name: 检查并安装 drone
  ansible.builtin.shell: |
    set -o pipefail
    command -v drone >/dev/null 2>&1 && echo drone installed || (
      cd /tmp &&
      curl -L https://github.com/drone/drone-cli/releases/latest/download/drone_linux_amd64.tar.gz |
        tar zx &&
      sudo install drone /usr/local/bin &&
      rm -f drone
    )
  args:
    executable: /bin/bash
  register: install_drone_result
  changed_when: "'drone installed' not in install_drone_result.stdout"
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - initialize

- name: 检查并安装 act
  ansible.builtin.shell: |
    set -o pipefail
    command -v act >/dev/null 2>&1 && echo act installed || (
      curl -sSf https://raw.githubusercontent.com/nektos/act/master/install.sh |
        sudo bash -s -- -b /usr/local/bin
    )
  args:
    executable: /bin/bash
  register: install_act_result
  changed_when: "'act installed' not in install_act_result.stdout"
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - initialize

- name: 检查并安装 uv
  ansible.builtin.shell: |
    set -o pipefail
    command -v uv >/dev/null 2>&1 && echo uv installed ||
      (curl -LsSf https://astral.sh/uv/install.sh | sh)
  args:
    executable: /bin/bash
  register: install_uv_result
  changed_when: "'uv installed' not in install_uv_result.stdout"
  failed_when: false
  tags:
    - initialize

- name: 检查并安装 devbox
  ansible.builtin.shell: |
    set -o pipefail
    command -v devbox >/dev/null 2>&1 && echo devbox installed ||
      (curl -fsSL https://get.jetify.com/devbox | bash -s -- -f)
  args:
    executable: /bin/bash
  register: install_devbox_result
  changed_when: "'devbox installed' not in install_devbox_result.stdout"
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - initialize

- name: Linux/macOS15 检查并安装 nix
  ansible.builtin.shell: |
    set -o pipefail
    command -v nix >/dev/null 2>&1 && echo nix installed ||
      (curl -L https://nixos.org/nix/install | sh)
  args:
    executable: /bin/bash
  register: install_nix_result
  changed_when: "'nix installed' not in install_nix_result.stdout"
  failed_when: false
  tags:
    - initialize
  when: (common_is_linux_os or common_is_high_mac_os) and ansible_user_id != "root"

- name: MacOS13 检查并安装 nix
  ansible.builtin.shell: |
    set -o pipefail
    command -v nix >/dev/null 2>&1 && echo nix installed ||
      (curl -L https://releases.nixos.org/nix/nix-2.18.1/install | sh)
  args:
    executable: /bin/bash
  register: install_legacy_nix_result
  changed_when: "'nix installed' not in install_legacy_nix_result.stdout"
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os and not common_is_high_mac_os and ansible_user_id != "root"

- name: "MacOS修改nix配置"
  ansible.builtin.copy:
    src: nix.conf
    dest: "/etc/nix/nix.conf"
    mode: "0644"
    force: true
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root"

- name: 检查并安装 direnv
  ansible.builtin.shell: |
    set -o pipefail
    command -v direnv >/dev/null 2>&1 && echo direnv installed || (
      curl -sfL https://direnv.net/install.sh |
        bin_path=/usr/local/bin sudo -E bash
    )
  args:
    executable: /bin/bash
  register: install_direnv_result
  changed_when: "'direnv installed' not in install_direnv_result.stdout"
  failed_when: false
  tags:
    - initialize

- name: 检查 atuin 是否已安装
  ansible.builtin.shell: |
    set -o pipefail
    command -v atuin >/dev/null 2>&1 && echo atuin installed || (
      curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh |
        sh -s -- --non-interactive
    )
  args:
    executable: /bin/bash
  register: install_atuin_result
  changed_when: "'atuin installed' not in install_atuin_result.stdout"
  failed_when: false
  tags:
    - initialize

- name: 检查并安装 sing-box
  ansible.builtin.shell: |
    set -o pipefail
    command -v sing-box >/dev/null 2>&1 && echo sing-box installed ||
      (curl -fsSL https://sing-box.app/install.sh | sh)
  args:
    executable: /bin/bash
  register: install_sing_box_result
  changed_when: "'sing-box installed' not in install_sing_box_result.stdout"
  failed_when: false
  tags:
    - initialize
  when: common_is_linux_os

- name: 检查并安装 cargo
  ansible.builtin.shell: |
    set -o pipefail
    command -v cargo >/dev/null 2>&1 && echo cargo installed ||
      (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y)
  args:
    executable: /bin/bash
  register: install_cargo_result
  changed_when: "'cargo installed' not in install_cargo_result.stdout"
  failed_when: false
  tags:
    - initialize

- name: 检查 rustup 默认工具链是否已设置
  ansible.builtin.shell: |
    set -o pipefail
    rustup default | grep -q stable && echo 0 || echo 1
  args:
    executable: /bin/bash
  register: install_rustup_default_needed
  changed_when: false
  failed_when: false
  tags:
    - initialize

- name: 设置 rustup 默认工具链为 stable
  ansible.builtin.shell: "rustup default stable 2>/dev/null || true"
  register: install_rustup_default_result
  changed_when: install_rustup_default_needed.stdout == "1"
  failed_when: false
  tags:
    - initialize
  when: install_rustup_default_needed.stdout == "1"

- name: 通过 cargo 安装软件包
  ansible.builtin.shell: |
    set -o pipefail
    if [ "$(cargo install --list | grep -c "{{ item }}")" = "0" ]; then
      cargo install "{{ item }}"
    else
      echo "{{ item }} is installed"
    fi
  args:
    executable: /bin/bash
  with_items:
    - fd-find
    - du-dust
    - sd
    - tokei
  register: install_cargo_package_result
  changed_when: "'is installed' not in install_cargo_package_result.stdout"
  failed_when: false
  tags:
    - initialize
  when: install_cargo_result is defined
