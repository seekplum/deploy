---
# tasks file for install

- name: 获取 PATH
  ansible.builtin.command: echo $PATH
  register: install_current_path_result
  changed_when: false
  tags:
    - initialize

- name: 打印 PATH
  ansible.builtin.debug:
    msg: "{{ install_current_path_result.stdout }}"
  tags:
    - initialize

- name: 检查并安装 chezmoi
  ansible.builtin.shell: |
    set -o pipefail
    command -v chezmoi >/dev/null 2>&1 && echo chezmoi installed ||
      (curl -fsLS get.chezmoi.io | sh -s -- -b /usr/local/bin)
  args:
    executable: /bin/bash
  register: install_chezmoi_result
  changed_when: "'chezmoi installed' not in install_chezmoi_result.stdout"
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - initialize

- name: 应用 chezmoi 配置
  ansible.builtin.shell: "chezmoi init && chezmoi apply --force"
  changed_when: false
  failed_when: false
  tags:
    - initialize

- name: 检查 macOS 是否已安装 Homebrew
  ansible.builtin.shell: "brew --version >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_existing_of_brew
  changed_when: false
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root"

- name: 在 macOS 上安装 Homebrew
  ansible.builtin.shell: 'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
  changed_when: true
  tags:
    - initialize
  when: common_is_mac_os and ansible_user_id != "root" and install_existing_of_brew.stdout == "1"

# - name: add mysql repo on Redhat
