---
# tasks file for install

- name: 检查 chezmoi 是否已安装
  ansible.builtin.shell: "command -v chezmoi >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_existing_of_chezmoi
  changed_when: false
  tags:
    - initialize

- name: 输出 chezmoi 检查结果
  ansible.builtin.debug:
    msg: "chezmoi {{ '已安装' if install_existing_of_chezmoi.stdout == '0' else '未安装' }}"
  tags:
    - initialize

- name: 安装 chezmoi
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsLS get.chezmoi.io | sh -s -- -b /usr/local/bin
  args:
    executable: /bin/bash
  changed_when: true
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - initialize
  when: install_existing_of_chezmoi.stdout == "1"

- name: 应用 chezmoi 配置
  ansible.builtin.shell: "chezmoi init && chezmoi apply --force"
  changed_when: false
  failed_when: false
  tags:
    - initialize

- name: 检查 macOS 是否已安装 Homebrew
  ansible.builtin.shell: "brew --version >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_existing_of_brew
  changed_when: false
  tags:
    - initialize
  when: common_is_mac_os

- name: 输出 Homebrew 检查结果
  ansible.builtin.debug:
    msg: "Homebrew {{ '已安装' if install_existing_of_brew.stdout == '0' else '未安装' }}"
  tags:
    - initialize
  when: common_is_mac_os

- name: 在 macOS 上安装 Homebrew
  ansible.builtin.shell: 'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
  changed_when: true
  tags:
    - initialize
  when: common_is_mac_os and install_existing_of_brew.stdout == "1"

