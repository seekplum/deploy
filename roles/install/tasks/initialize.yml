- name: 输出 cargo 检查结果
  ansible.builtin.debug:
    msg: "cargo {{ '已安装' if install_existing_of_cargo.stdout == '0' else '未安装' }}"
  tags:
    - initialize

- name: 安装 cargo
  ansible.builtin.shell: |
    set -o pipefail
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - initialize
  when: install_existing_of_cargo.stdout == "1"

- name: 检查 rustup 默认工具链是否已设置
  ansible.builtin.shell: |
    set -o pipefail
    rustup default | grep -q stable && echo 0 || echo 1
  args:
    executable: /bin/bash
  register: install_rustup_default_needed
  changed_when: false
  failed_when: false
  tags:
    - initialize

- name: 输出 rustup 默认工具链检查结果
  ansible.builtin.debug:
    msg: "rustup 默认工具链 {{ '已设置为 stable' if install_rustup_default_needed.stdout == '0' else '未设置为 stable' }}"
  tags:
    - initialize

- name: 设置 rustup 默认工具链为 stable
  ansible.builtin.shell: "rustup default stable 2>/dev/null || true"
  register: install_rustup_default_result
  changed_when: install_rustup_default_needed.stdout == "1"
  failed_when: false
  tags:
    - initialize
  when: install_rustup_default_needed.stdout == "1"

- name: 通过 cargo 安装软件包
  ansible.builtin.shell: |
    set -o pipefail
    if [ "$(cargo install --list | grep -c "{{ item }}")" = "0" ]; then
      cargo install "{{ item }}"
    else
      echo "{{ item }} is installed"
    fi
  args:
    executable: /bin/bash
  with_items:
    - fd-find
    - du-dust
    - sd
    - tokei
  register: install_cargo_package_result
  changed_when: "'is installed' not in install_cargo_package_result.stdout"
  failed_when: false
  tags:
    - initialize
  when: install_existing_of_cargo.stdout == "0" or install_existing_of_cargo.stdout == "1"
