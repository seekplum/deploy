- name: 在 Redhat 上添加 EPEL RPM-GPG 密钥
  ansible.builtin.command: sudo curl -fSL --connect-timeout 5 --retry 100 --retry-connrefused --retry-delay 1 --retry-max-time 100
    https://archive.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }} -o /etc/pki/rpm-gpg/RPM-GPG-KEY-EPEL-{{
    ansible_distribution_major_version }}
  tags:
    - initialize
  failed_when: false
  changed_when: false
  when: common_is_centos_os

- name: 在 Redhat 上换源
  ansible.builtin.shell: |
    set -o pipefail
    sed -i -e 's|^mirrorlist=|#mirrorlist=|g' \
      -e 's|^# baseurl=https://repo.almalinux.org|baseurl=https://mirrors.aliyun.com|g' \
      /etc/yum.repos.d/almalinux*.repo

    sed -i -e 's|^metalink=|#metalink=|g' \
      -e 's|^#baseurl=https://download.example/pub|baseurl=https://mirrors.aliyun.com|g' \
      -e 's|^#baseurl=https://download.fedoraproject.org/pub|baseurl=https://mirrors.aliyun.com|g' \
      /etc/yum.repos.d/epel*.repo

    dnf install epel-release -y
  args:
    executable: /bin/bash
  tags:
    - initialize
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_centos_os

- name: 在 Redhat 上安装基础软件包
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
    update_cache: true
    # nobest: true
  with_items:
    - zip
    - unzip
    # - util-linux-user
    - epel-release
    - gcc
    - gcc-c++
    - zlib
    - zlib-devel
    - libffi-devel
    - sqlite-devel
    - readline-devel
    - rsync
    - git
    - bzip2
    - bzip2-devel
    #    - python-setuptools
    #    - python-devel
    - wget
    - screen
    - make
    - cmake
    - tree
    - sshpass
    - openssl-devel
    - yum-utils
    - device-mapper-persistent-data
    - lvm2
    # - haveged
    # - the_silver_searcher
    - patch
    - pcre-devel
    - ripgrep
    - mongodb-mongosh
    - knot
    - telnet
  tags:
    - initialize
  when: common_is_centos_os

