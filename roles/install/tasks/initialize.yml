- name: 检查 nix 是否已安装
  ansible.builtin.shell: "command -v nix >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_existing_of_nix
  changed_when: false
  tags:
    - nix
  when: (common_is_linux_os or common_is_high_mac_os)

- name: 输出 nix 检查结果
  ansible.builtin.debug:
    msg: "nix {{ '已安装' if install_existing_of_nix.stdout == '0' else '未安装' }}"
  tags:
    - nix
  when: (common_is_linux_os or common_is_high_mac_os)

- name: 在 Linux 上清除 nix 安装残留
  ansible.builtin.shell: |
    set -o pipefail
    sudo systemctl stop nix-daemon.socket
    sudo systemctl stop nix-daemon.service
    sudo systemctl disable nix-daemon.socket
    sudo systemctl disable nix-daemon.service
    sudo systemctl daemon-reload
    sudo mv /etc/bashrc.backup-before-nix /etc/bashrc
    sudo rm -rf "/etc/nix" "/nix" "~/.nix-profile" "~/.nix-defexpr" "~/.nix-channels" "~/.local/state/nix" "~/.cache/nix" "~/.nix-profile" "~/.nix-defexpr" "~/.nix-channels" "~/.local/state/nix" "~/.cache/nix"
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - nix
  when:
    - common_is_linux_os or common_is_high_mac_os
    - install_existing_of_nix.stdout == "1"

- name: 在 RedHat 上禁用 SELinux 以安装 nix
  ansible.posix.selinux:
    state: disabled
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - nix
  when:
    - common_is_centos_os
    - install_existing_of_nix.stdout == "1"

- name: 在 RedHat 上临时关闭 SELinux 以安装 nix
  ansible.builtin.command: setenforce 0
  changed_when: false
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - nix
  when:
    - common_is_centos_os
    - install_existing_of_nix.stdout == "1"

- name: 在 Linux/macOS15 上安装 nix
  ansible.builtin.shell: |
    set -o pipefail
    curl -L https://nixos.org/nix/install | sh -s -- --daemon
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - nix
  when:
    - common_is_linux_os or common_is_high_mac_os
    - install_existing_of_nix.stdout == "1"

- name: 检查旧版 nix 是否已安装
  ansible.builtin.shell: "command -v nix >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_existing_of_legacy_nix
  changed_when: false
  tags:
    - nix
  when: common_is_mac_os and not common_is_high_mac_os

- name: 输出旧版 nix 检查结果
  ansible.builtin.debug:
    msg: "nix {{ '已安装' if install_existing_of_legacy_nix.stdout == '0' else '未安装' }}"
  tags:
    - nix
  when: common_is_mac_os and not common_is_high_mac_os

- name: 在 MacOS13 上安装 nix
  ansible.builtin.shell: |
    set -o pipefail
    curl -L https://releases.nixos.org/nix/nix-2.18.1/install | sh
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - nix
  when:
    - common_is_mac_os and not common_is_high_mac_os
    - install_existing_of_legacy_nix.stdout == "1"

- name: "MacOS修改nix配置"
  ansible.builtin.copy:
    src: nix.conf
    dest: "/etc/nix/nix.conf"
    mode: "0644"
    force: true
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - nix
