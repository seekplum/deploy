    cd "{{ install_cfst_download_dir }}"
    ditto -x -k "{{ install_cfst_package_path }}" .
    chmod +x cfst
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - cfst
  when:
    - install_existing_of_cfst.stdout == "1"
    - common_is_mac_os

