---
# tasks file for install

- name: get path
  command: echo $PATH
  register: current_path_result
  tags:
    - initialize

- name: print path
  debug:
    msg: "{{ current_path_result.stdout }}"
  tags:
    - initialize

- name: check chezmoi installed
  shell: "command -v chezmoi >/dev/null 2>&1 && echo chezmoi installed || (curl -fsLS get.chezmoi.io | sh -s -- -b /usr/local/bin)"
  become: true
  become_method: sudo
  tags:
    - initialize

- name: chezmoi apply
  shell: "chezmoi init && chezmoi apply --force"
  changed_when: false
  ignore_errors: true
  tags:
    - initialize

- name: check existing brew on macOS
  shell: "brew --version >/dev/null 2>&1 && echo 0 || echo 1"
  register: existing_of_brew
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root"

- name: install brew on macOS
  shell: 'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root" and existing_of_brew.stdout == "1"

# - name: add mysql repo on Redhat
#   shell: sudo rpm -Uvh http://dev.mysql.com/get/mysql-community-release-el7-5.noarch.rpm
#   tags:
#     - initialize
#   ignore_errors: true
#   when: is_centos_os

- name: add RPM-GPG-KEY-EPEL on Redhat
  shell: sudo curl -fSL --connect-timeout 5 --retry 100 --retry-connrefused --retry-delay 1 --retry-max-time 100 https://archive.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }} -o /etc/pki/rpm-gpg/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}
  tags:
    - initialize
  ignore_errors: true
  when: is_centos_os

- name: install packages on Redhat
  yum:
    name: "{{ item }}"
    state: present
    update_cache: true
    # nobest: true
  with_items:
    # - python2-pip
    - python3-pip
    - zip
    - unzip
    # - util-linux-user
    - epel-release
    - gcc
    - gcc-c++
    - zlib
    - zlib-devel
    - libffi-devel
    - sqlite-devel
    - readline-devel
    - rsync
    - git
    - bzip2
    - bzip2-devel
    #    - python-setuptools
    #    - python-devel
    - wget
    - screen
    - make
    - cmake
    - tree
    - sshpass
    - openssl-devel
    - openssl11
    - openssl11-devel
    - yum-utils
    - device-mapper-persistent-data
    - lvm2
    # - haveged
    # - the_silver_searcher
    - patch
    - pcre-devel
    - ripgrep
    - knot
  tags:
    - initialize
  when: is_centos_os

# - name: install pip on Redhat
#   shell: yum -y install epel-release python-pip
#   tags:
#     - initialize
#   when: is_centos_os

# sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys <Key>
# https://stackoverflow.com/questions/51622712/ansible-requires-python-apt-but-its-already-installed
# ansible -i hosts common -m "apt name=python-apt state=latest" --become-user root
# shell: "sudo apt-get install -y {{ item }}"

- name: install MongoDB 6.0 GPG key
  shell: "test -f /usr/share/keyrings/mongodb-server-6.0.gpg && echo 'server-6.0.asc exists' || curl -fsSL https://www.mongodb.org/static/pgp/server-6.0.asc | sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-6.0.gpg"
  tags:
    - initialize
  ignore_errors: true
  become: true
  become_method: sudo
  when: is_ubuntu_os

- name: install missing GPG public key
  apt_key:
    keyserver: keyserver.ubuntu.com
    id: "{{ item }}"
  loop:
    - E363C90F8F1B6217
    - A1715D88E1DF1F24
  tags:
    - initialize
  ignore_errors: true
  become: true
  become_method: sudo
  when: is_ubuntu_os

- name: install packages on Ubuntu
  apt:
    pkg:
      - curl
      - jq
      - gcc
      - rsync
      - git
      - bzip2
      - python3-setuptools
      - python3-dev
      - wget
      - screen
      - make
      - cmake
      - tree
      - sshpass
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - llvm
      - libncurses5-dev
      - software-properties-common
      - haveged
      - silversearcher-ag
      - apt-transport-https
      # - ca-certificates
      - gnupg-agent
      - gnupg2
      - python3-apt
      - libffi-dev
      - python3
      - python3-pip
      - pinentry-gtk2
      - python3-tk
      - tk-dev
      - libpcre3-dev
      - ripgrep
      - mongodb-mongosh
      - knot-dnsutils
      - keychain
      - sqlite3
      - groovy
      - shfmt
      - shellcheck
      - unzip
      - age
    state: present
    update_cache: true
    cache_valid_time: 86400
  tags:
    - initialize
  ignore_errors: true
  become: true
  become_method: sudo
  when: is_ubuntu_os

- name: install xcode-select on macOS
  shell: "xcode-select -v >/dev/null 2>&1 || xcode-select --install"
  ignore_errors: true
  tags:
    - initialize
  when: is_mac_os

- name: 清除 brew 残留锁 & 临时文件
  shell: |
    rm -rf ~/Library/Caches/Homebrew/*.incomplete
    rm -rf ~/Library/Caches/Homebrew/*.lock
    rm -rf /private/tmp/.brew_lock
    brew cleanup --force 2>/dev/null ||
    pkill -f "brew install" 2>/dev/null || true
    pkill -f "brew" 2>/dev/null || true
  ignore_errors: true
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root"

- name: install packages on macOS
  community.general.homebrew:
    name:
      - wget
      - tree
      - zlib
      - sqlite
      - the_silver_searcher
      - gnupg
      - pinentry-mac
      - ripgrep
      - age
      - shfmt
      - shellcheck
      - esolitos/ipa/sshpass
      - knot
      - go
      - zulu@8
      - lua
      - maccy
      - mongodb/brew/mongodb-community
      - redis
      - lima
    state: present
  ignore_errors: true
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root"

- name: install cask packages on macOS
  community.general.homebrew:
    name:
      - farion1231/ccswitch/cc-switch
      - warp
    state: present
  ignore_errors: true
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root"

# 1. 访问 https://www.macports.org/install.php 安装 MacPorts，安装完成后执行以下命令更换 MacPorts 镜像源
# 2. /opt/local/etc/macports/sources.conf 注释掉 rsync://rsync. 开头部分，换成下方 https 链接
# https://mirrors.tuna.tsinghua.edu.cn/macports/release/ports.tar.gz [default]
# 3. /opt/local/etc/macports/macports.conf 更改如下配置
# preferred_hosts         mirrors.ustc.edu.cn
# rsync_server            mirrors.ustc.edu.cn
# 4. 更新 MacPorts 镜像源
# sudo -E port -d selfupdate
- name: Check MacPorts installed
  shell: "command -v port >/dev/null 2>&1 && echo 0 || echo 1"
  register: macports_installed
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root"

- name: port install packages on macOS
  shell: 'if [ $(port installed | grep {{ item }} | wc -l) == "0" ]; then sudo port -N install {{ item }} && sudo port load {{ item }}; else echo {{ item }} is installed; fi'
  with_items:
    - knot
  ignore_errors: true
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root" and macports_installed.stdout == "0"

- name: check drone installed
  shell: "command -v drone >/dev/null 2>&1 && echo drone installed || (cd /tmp && curl -L https://github.com/drone/drone-cli/releases/latest/download/drone_linux_amd64.tar.gz | tar zx && sudo install drone /usr/local/bin && rm -f drone)"
  ignore_errors: true
  become: true
  become_method: sudo
  tags:
    - initialize

- name: check act installed
  shell: "command -v act >/dev/null 2>&1 && echo act installed || (curl -sSf https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin)"
  ignore_errors: true
  become: true
  become_method: sudo
  tags:
    - initialize

- name: check uv installed
  shell: "command -v uv >/dev/null 2>&1 && echo uv installed || (curl -LsSf https://astral.sh/uv/install.sh | sh)"
  ignore_errors: true
  tags:
    - initialize

- name: check devbox installed
  shell: "command -v devbox >/dev/null 2>&1 && echo devbox installed || (curl -fsSL https://get.jetify.com/devbox | bash -s -- -f)"
  ignore_errors: true
  become: true
  become_method: sudo
  tags:
    - initialize

- name: check nix installed
  shell: "command -v nix >/dev/null 2>&1 && echo nix installed || (curl -L https://nixos.org/nix/install | sh)"
  ignore_errors: true
  tags:
    - initialize
  when: (is_linux_os or is_high_mac_os) and ansible_user_id != "root"

- name: check nix installed
  shell: "command -v nix >/dev/null 2>&1 && echo nix installed || (curl -L https://releases.nixos.org/nix/nix-2.18.1/install | sh)"
  ignore_errors: true
  tags:
    - initialize
  when: is_mac_os and not is_high_mac_os and ansible_user_id != "root"

- name: "macOS修改nix配置"
  copy:
    src: nix.conf
    dest: "/etc/nix/nix.conf"
    mode: "0644"
    force: true
  become: true
  become_method: sudo
  tags:
    - initialize
  when: is_mac_os and ansible_user_id != "root"

- name: check direnv installed
  shell: "command -v direnv >/dev/null 2>&1 && echo direnv installed || (curl -sfL https://direnv.net/install.sh | bin_path=/usr/local/bin sudo -E bash)"
  ignore_errors: true
  tags:
    - initialize

- name: check atuin installed
  shell: "command -v atuin >/dev/null 2>&1 && echo atuin installed || (curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh -s -- --non-interactive)"
  ignore_errors: true
  tags:
    - initialize

- name: check sing-box installed
  shell: "command -v sing-box >/dev/null 2>&1 && echo sing-box installed || (curl -fsSL https://sing-box.app/install.sh | sh)"
  ignore_errors: true
  tags:
    - initialize
  when: is_linux_os

- name: check cargo installed
  shell: "command -v cargo >/dev/null 2>&1 && echo cargo installed || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y)"
  register: result_of_install_cargo
  ignore_errors: true
  tags:
    - initialize

- name: 检查 rustup 默认工具链是否已设置
  shell: rustup default | grep -q stable && echo 0 || echo 1
  register: rustup_default_needed
  changed_when: false
  ignore_errors: true
  tags:
    - initialize

- name: 设置 rustup 默认工具链为 stable
  shell: 'rustup default stable 2>/dev/null || true'
  ignore_errors: true
  tags:
    - initialize
  when: rustup_default_needed.stdout == "1"

- name: cargo install packages
  shell: 'if [ $(cargo install --list | grep {{ item }} | wc -l) == "0" ]; then cargo install {{ item }}; else echo {{ item }} is installed; fi'
  with_items:
    - fd-find
    - du-dust
    - sd
    - tokei
  ignore_errors: true
  tags:
    - initialize
  when: result_of_install_cargo is defined

