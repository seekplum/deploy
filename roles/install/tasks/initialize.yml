- name: 在 Redhat 上添加 EPEL RPM-GPG 密钥
  ansible.builtin.command: sudo curl -fSL --connect-timeout 5 --retry 100 --retry-connrefused --retry-delay 1 --retry-max-time 100
    https://archive.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }} -o /etc/pki/rpm-gpg/RPM-GPG-KEY-EPEL-{{
    ansible_distribution_major_version }}
  tags:
    - redhat_base_packages
  failed_when: false
  changed_when: false
  when: common_is_centos_os

- name: 在 Redhat 上换源
  ansible.builtin.shell: |
    set -o pipefail
    changed=0
    if grep -qE '^(mirrorlist=|metalink=|# ?baseurl=https://repo.almalinux.org|#baseurl=https://download.example/pub|#baseurl=https://download.fedoraproject.org/pub)' \
      /etc/yum.repos.d/almalinux*.repo /etc/yum.repos.d/epel*.repo 2>/dev/null; then
      changed=1
    fi

    sed -i -e 's|^mirrorlist=|#mirrorlist=|g' \
      -e 's|^# baseurl=https://repo.almalinux.org|baseurl=https://mirrors.aliyun.com|g' \
      /etc/yum.repos.d/almalinux*.repo

    sed -i -e 's|^metalink=|#metalink=|g' \
      -e 's|^#baseurl=https://download.example/pub|baseurl=https://mirrors.aliyun.com|g' \
      -e 's|^#baseurl=https://download.fedoraproject.org/pub|baseurl=https://mirrors.aliyun.com|g' \
      /etc/yum.repos.d/epel*.repo

    if [ "${changed}" = "1" ]; then
      dnf install epel-release -y
    fi
    echo "changed=${changed}"
  args:
    executable: /bin/bash
  register: install_redhat_repo_mirror_result
  tags:
    - redhat_base_packages
  failed_when: false
  changed_when: "'changed=1' in install_redhat_repo_mirror_result.stdout"
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_centos_os

- name: 在 Redhat 上安装基础包仓库工具
  ansible.builtin.dnf:
    name:
      - epel-release
      - yum-utils
    state: present
    update_cache: false
  tags:
    - redhat_base_packages
  when: common_is_centos_os

- name: 在 Redhat 上启用开发包仓库
  ansible.builtin.shell: |
    set -o pipefail
    repo_id=""
    for candidate in crb powertools PowerTools; do
      if dnf repolist all --quiet | awk '{print $1}' | grep -qx "${candidate}"; then
        repo_id="${candidate}"
        break
      fi
    done

    if [ -z "${repo_id}" ]; then
      echo "repo=none"
      exit 0
    fi

    if dnf repolist enabled --quiet | awk '{print $1}' | grep -qx "${repo_id}"; then
      echo "changed=0 repo=${repo_id}"
    else
      dnf config-manager --set-enabled "${repo_id}"
      echo "changed=1 repo=${repo_id}"
    fi
  args:
    executable: /bin/bash
  register: install_redhat_devel_repo_result
  changed_when: "'changed=1' in install_redhat_devel_repo_result.stdout"
  tags:
    - redhat_base_packages
  when: common_is_centos_os

