- name: "MacOS修改nix配置"
  ansible.builtin.copy:
    src: nix.conf
    dest: "/etc/nix/nix.conf"
    mode: "0644"
    force: true
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - initialize
  when: common_is_mac_os

