- name: 解压并安装 cfst (Linux)
  ansible.builtin.shell: |
    set -o pipefail
    cd "{{ install_cfst_download_dir }}"
    tar -zxf "{{ install_cfst_package_path }}"
    chmod +x cfst
  args:
