- name: 安装 MongoDB 6.0 GPG 密钥
  ansible.builtin.shell: |
    set -o pipefail
    if [ -f /usr/share/keyrings/mongodb-server-6.0.gpg ]; then
      echo "server-6.0.asc exists"
    else
      curl -fsSL https://www.mongodb.org/static/pgp/server-6.0.asc |
        sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-6.0.gpg
    fi
  args:
    executable: /bin/bash
  tags:
    - initialize
  register: install_mongodb_gpg_key_result
  changed_when: "'server-6.0.asc exists' not in install_mongodb_gpg_key_result.stdout"
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

- name: 安装缺失的 GPG 公钥
  ansible.builtin.apt_key:
    keyserver: keyserver.ubuntu.com
    id: "{{ item }}"
  loop:
    - E363C90F8F1B6217
    - A1715D88E1DF1F24
  tags:
    - initialize
  failed_when: false
  become: true
  become_method: ansible.builtin.sudo
  when: common_is_ubuntu_os

