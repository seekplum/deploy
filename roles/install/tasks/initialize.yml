- name: 安装 drone
  ansible.builtin.shell: |
    set -o pipefail
    cd /tmp
    curl -L https://github.com/drone/drone-cli/releases/latest/download/drone_{{ common_platform_suffix }}.tar.gz |
      tar zx
    sudo install drone /usr/local/bin
    rm -f drone
  args:
    executable: /bin/bash
  changed_when: true
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - drone
  when: install_existing_of_drone.stdout == "1"

