- name: 在 macOS 上安装 xcode-select
  ansible.builtin.shell: "xcode-select -v >/dev/null 2>&1 || xcode-select --install"
  register: install_xcode_select_result
  changed_when: install_xcode_select_result.rc == 0 and install_xcode_select_result.stdout != ""
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os

- name: 清除 brew 残留锁 & 临时文件
  ansible.builtin.shell: |
    rm -rf ~/Library/Caches/Homebrew/*.incomplete
    rm -rf ~/Library/Caches/Homebrew/*.lock
    rm -rf /private/tmp/.brew_lock
    brew cleanup --force 2>/dev/null ||
    pkill -f "brew install" 2>/dev/null || true
    pkill -f "brew" 2>/dev/null || true
  changed_when: false
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os

- name: 信任brew源
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop:
    - farion1231/ccswitch
    - mongodb/brew
    - sunnyyoung/tap
  tags:
    - initialize
  when: common_is_mac_os

- name: 在 macOS 上安装基础软件包
  community.general.homebrew:
    name:
      - wget
      - tree
      - zlib
      - sqlite
      - the_silver_searcher
      - gnupg
      - pinentry-mac
      - ripgrep
      - age
      - shfmt
      - shellcheck
      - esolitos/ipa/sshpass
      - knot
      - go
      - zulu@8
      - lua
      - maccy
      - mongodb-community
      - redis
      - lima
      - showkey
      - sunnyyoung/tap/wechattweak
      - yamlfmt
      - kubernetes-cli
      - telnet
    state: present
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os

- name: 检查 macOS Cask 应用是否已存在
  ansible.builtin.stat:
    path: "{{ item.app_path }}"
  loop:
    - name: cc-switch
      install_name: farion1231/ccswitch/cc-switch
      app_path: "/Applications/CC Switch.app"
    - name: warp
      install_name: warp
      app_path: "/Applications/Warp.app"
  register: install_macos_cask_apps
  tags:
    - initialize
  when: common_is_mac_os

- name: 输出 macOS Cask 应用检查结果
  ansible.builtin.debug:
    msg: "{{ item.item.name }} {{ '已存在' if item.stat.exists else '不存在' }}"
  loop: "{{ install_macos_cask_apps.results }}"
  tags:
    - initialize
  when: common_is_mac_os

- name: 在 macOS 上安装 Cask 软件包
  ansible.builtin.shell: |
    brew list --cask "{{ item.item.name }}" >/dev/null 2>&1 ||
      brew install --cask "{{ item.item.install_name }}"
  loop: "{{ install_macos_cask_apps.results }}"
  changed_when: "'Installing' in install_cask_install_result.stdout or 'Installing' in install_cask_install_result.stderr"
  failed_when:
    - install_cask_install_result.rc != 0
    - "'already an App at' not in install_cask_install_result.stderr"
  register: install_cask_install_result
  tags:
    - initialize
  when:
    - common_is_mac_os
    - not item.stat.exists

# 1. 访问 https://www.macports.org/install.php 安装 MacPorts，安装完成后执行以下命令更换 MacPorts 镜像源
# 2. /opt/local/etc/macports/sources.conf 注释掉 rsync://rsync. 开头部分，换成下方 https 链接
# https://mirrors.tuna.tsinghua.edu.cn/macports/release/ports.tar.gz [default]
# 3. /opt/local/etc/macports/macports.conf 更改如下配置
# preferred_hosts         mirrors.ustc.edu.cn
# rsync_server            mirrors.ustc.edu.cn
# 4. 更新 MacPorts 镜像源
# sudo -E port -d selfupdate
- name: 检查 MacPorts 是否已安装
  ansible.builtin.shell: "command -v port >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_macports_installed
  changed_when: false
  tags:
    - initialize
  when: common_is_mac_os

- name: 输出 MacPorts 检查结果
  ansible.builtin.debug:
    msg: "MacPorts {{ '已安装' if install_macports_installed.stdout == '0' else '未安装' }}"
  tags:
    - initialize
  when: common_is_mac_os

- name: 在 macOS 上通过 MacPorts 安装软件包
  ansible.builtin.shell: |
    set -o pipefail
    if [ "$(port installed | grep -c "{{ item }}")" = "0" ]; then
      sudo port -N install "{{ item }}"
      sudo port load "{{ item }}"
    else
      echo "{{ item }} is installed"
    fi
  args:
    executable: /bin/bash
  with_items:
    - knot
  register: install_macports_package_result
  changed_when: "'is installed' not in install_macports_package_result.stdout"
  failed_when: false
  tags:
    - initialize
  when: common_is_mac_os and install_macports_installed.stdout == "0"

- name: 检查 drone 是否已安装
  ansible.builtin.shell: "command -v drone >/dev/null 2>&1 && echo 0 || echo 1"
  register: install_existing_of_drone
  changed_when: false
  tags:
    - initialize

- name: 输出 drone 检查结果
