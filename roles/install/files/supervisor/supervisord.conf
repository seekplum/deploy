
[unix_http_server]
file=/tmp/hll-supervisor.sock

[supervisord]
logfile=/tmp/hll-supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/tmp/hll-supervisord.pid
nodaemon=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/hll-supervisor.sock

[include]
files = conf.d/*.conf
