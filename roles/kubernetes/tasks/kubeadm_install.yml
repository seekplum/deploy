---
- name: "清除注释"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "# k8s node"
    state: absent
  become: true
  become_method: ansible.builtin.sudo
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "配置hosts"
  ansible.builtin.blockinfile:
    path: /etc/hosts
    state: present
    marker: "# k8s node"
    block: |
      {{ hostvars[item].ansible_default_ipv4.address }} {{ hostvars[item].ansible_hostname }}
  become: true
  become_method: ansible.builtin.sudo
  loop: "{{ groups['masters'] + groups['slaves'] }}"
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Ubuntu关闭防火墙"
  ansible.builtin.service:
    name: "ufw"
    state: "stopped"
    enabled: "no"
  tags:
    - kubeadm
  when: common_is_ubuntu_os

- name: "RedHat关闭防火墙"
  ansible.builtin.service:
    name: "firewalld"
    state: "stopped"
    enabled: "no"
  tags:
    - kubeadm
  when: common_is_centos_os

- name: "临时关闭交换分区"
  ansible.builtin.command: swapoff -a
  changed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux获取交换分区名字"
  ansible.builtin.command: awk '$3 == "swap" {print $1}' /etc/fstab
  register: kubernetes_swap_name
  changed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os

- name: 输出 Linux 交换分区检查结果
  ansible.builtin.debug:
    msg: "Linux 交换分区 {{ kubernetes_swap_name.stdout | default('') if (kubernetes_swap_name.stdout | default('')) != '' else '不存在' }}"
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux永久关闭交换分区"
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: "^({{ kubernetes_swap_name.stdout }})"
    replace: "# \\1"
  tags:
    - kubeadm
  when: common_is_linux_os and "stdout" in kubernetes_swap_name and not kubernetes_swap_name.stdout.startswith("#")

# --- 内核模块加载（overlay、br_netfilter）---
- name: "Linux加载内核模块"
  ansible.builtin.command: "modprobe {{ item }}"
  changed_when: false
  loop:
    - overlay
    - br_netfilter
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux持久化内核模块加载"
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter
  tags:
    - kubeadm
  when: common_is_linux_os

# --- SELinux 禁用（仅 CentOS）---
- name: "CentOS 禁用 SELinux（配置文件）"
  ansible.builtin.selinux:
    state: disabled
  tags:
    - kubeadm
  when: common_is_centos_os

- name: "CentOS 禁用 SELinux（立即生效）"
  ansible.builtin.command: setenforce 0
  changed_when: false
  failed_when: false
  tags:
    - kubeadm
  when: common_is_centos_os

# --- containerd 安装与配置 ---
- name: "配置 Docker 软件源"
  ansible.builtin.include_tasks:
    file: ../../common/tasks/docker-repo.yml
    apply:
      tags:
        - kubeadm
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux 安装 containerd"
  ansible.builtin.package:
    name: containerd.io
    state: present
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux 生成 containerd 默认配置"
  ansible.builtin.command:
    cmd: containerd config default
  register: kubernetes_containerd_default_config
  changed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux 创建 containerd 配置目录"
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux 写入 containerd 配置（SystemdCgroup + pause 镜像替换）"
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    mode: "0644"
    content: |
      {%- set _config = kubernetes_containerd_default_config.stdout |
         regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') |
         regex_replace('sandbox_image = "registry\.k8s\.io/pause:3\.[0-9]+"', 'sandbox_image = "' ~ kubernetes_pause_image ~ '"') -%}
      {{ _config }}
  tags:
    - kubeadm
  when: common_is_linux_os and kubernetes_containerd_default_config.stdout | default('') != ''

- name: "Linux 创建镜像加速目录"
  ansible.builtin.file:
    path: /etc/containerd/certs.d/docker.io
    state: directory
    mode: "0755"
  tags:
    - kubeadm
  when: common_is_linux_os and kubernetes_docker_mirror != ""

- name: "Linux 配置镜像加速（hosts.toml）"
  ansible.builtin.copy:
    dest: /etc/containerd/certs.d/docker.io/hosts.toml
    mode: "0644"
    content: |
      server = "https://docker.io"
      [host."{{ kubernetes_docker_mirror }}"]
        capabilities = ["pull", "resolve"]
  tags:
    - kubeadm
  when: common_is_linux_os and kubernetes_docker_mirror != ""

- name: "Linux 重启 containerd"
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes
  tags:
    - kubeadm
  when: common_is_linux_os

# --- 以下为原有任务 ---

- name: "Ubuntu添加阿里源"
  ansible.builtin.apt_key:
    url: https://mirrors.aliyun.com/kubernetes/apt/doc/apt-key.gpg
    state: present
  changed_when: false
  tags:
    - kubeadm
  when: common_is_ubuntu_os

- name: "Ubuntu修改k8s源内容"
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    mode: "0644"
    content: |
      deb https://mirrors.aliyun.com/kubernetes/apt/ kubernetes-xenial main
  tags:
    - kubeadm
  when: common_is_ubuntu_os

- name: "RedHat添加阿里源"
  ansible.builtin.shell:
    cmd: |
      cat >/etc/yum.repos.d/kubernetes.repo<<EOF
      [kubernetes]
      name=kubernetes
      baseurl=https://mirrors.aliyun.com/kubernetes/yum/repos/kubernetes-el7-x86_64/
      gpgcheck=0
      enable=1
      EOF
  changed_when: false
  tags:
    - kubeadm
  when: common_is_centos_os

- name: "Linux配置k8s内核参数"
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      vm.swappiness=0
      net.ipv4.ip_forward = 1
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux生效内核参数"
  ansible.builtin.command: sysctl --system
  changed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "RedHat安装kubeadm"
  ansible.builtin.dnf:
    name: ["kubelet", "kubectl", "kubeadm"]
    state: present
    update_cache: true
  tags:
    - kubeadm
  when: common_is_centos_os

- name: "Ubuntu安装kubeadm"
  ansible.builtin.apt:
    pkg: ["kubelet", "kubectl", "kubeadm"]
    state: present
    update_cache: true
    allow_change_held_packages: true
  tags:
    - kubeadm
  when: common_is_ubuntu_os

- name: "探测 CRI 运行时 socket 路径"
  ansible.builtin.shell: |
    set -o pipefail
    for endpoint in /run/containerd/containerd.sock /var/run/containerd/containerd.sock; do
      if crictl --runtime-endpoint "unix://$endpoint" info >/dev/null 2>&1; then
        echo "$endpoint"
        break
      fi
    done
  args:
    executable: /bin/bash
  register: kubernetes_cri_socket_find
  changed_when: false
  failed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "设置 CRI socket 路径"
  ansible.builtin.set_fact:
    kubernetes_cri_socket: "{{ '/run/containerd/containerd.sock' if kubernetes_cri_socket_find.stdout == '' else kubernetes_cri_socket_find.stdout }}"
  tags:
    - kubeadm
  when: common_is_linux_os

- name: 输出 CRI socket 检查结果
  ansible.builtin.debug:
    msg: "CRI socket {{ kubernetes_cri_socket | default('/run/containerd/containerd.sock') }}"
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux重启Docker"
  ansible.builtin.systemd:
    name: "docker"
    state: "restarted"
    daemon_reload: true
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux重启kubelet"
  ansible.builtin.service:
    name: "kubelet"
    state: "restarted"
    enabled: "yes"
    daemon_reload: true
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux检查kubeadm-flags.env文件是否存在"
  ansible.builtin.stat:
    path: /var/lib/kubelet/kubeadm-flags.env
  register: kubernetes_flags_stat
  changed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os

- name: 输出 kubeadm-flags.env 检查结果
  ansible.builtin.debug:
    msg: "kubeadm-flags.env {{ '已存在' if kubernetes_flags_stat.stat.exists else '不存在' }}"
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "Linux修改kubelet cgroup类型"
  ansible.builtin.replace:
    path: /var/lib/kubelet/kubeadm-flags.env
    regexp: "^(--cgroup-driver=[a-zA-Z]*)"
    replace: "--cgroup-driver=systemd"
  failed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os and kubernetes_flags_stat.stat.exists

# - name: "脚本方式拉取镜像"
#   ansible.builtin.script: "pull-images.sh"
#   changed_when: false
#   tags:
#     - kubeadm
#   when: common_is_linux_os

- name: "删除重复的文件"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
    force: true
  with_items:
    - "/etc/kubernetes/manifests/kube-apiserver.yaml"
    - "/etc/kubernetes/manifests/kube-controller-manager.yaml"
    - "/etc/kubernetes/manifests/kube-scheduler.yaml"
    - "/etc/kubernetes/manifests/etcd.yaml"
  tags:
    - kubeadm
  when: common_is_master_node

- name: "修改 Master server 地址"
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: "^(server: https://.*:6443)"
    replace: "server: https://{{ ansible_default_ipv4.address }}:6443"
  failed_when: false
  with_items:
    - "/etc/kubernetes/kubelet.conf"
    - "/etc/kubernetes/controller-manager.conf"
    - "/etc/kubernetes/scheduler.conf"
  tags:
    - kubeadm
  when: common_is_master_node

- name: "检查CNI插件是否已经下载"
  ansible.builtin.stat:
    path: "{{ kubernetes_cni_plugins_path_on_linux }}"
  register: kubernetes_cni_plugins_stat
  changed_when: false
  tags:
    - kubeadm
  when: common_is_linux_os

- name: 输出 CNI 插件安装包检查结果
  ansible.builtin.debug:
    msg: "CNI 插件安装包 {{ '已存在' if kubernetes_cni_plugins_stat.stat.exists else '不存在' }}"
  tags:
    - kubeadm
  when: common_is_linux_os

- name: "安装CNI插件"
  tags:
    - kubeadm
  when: common_is_linux_os
  block:
    - name: "创建目录"
      ansible.builtin.file:
        path: "{{ kubernetes_cni_plugins_director_on_linux }}"
        state: directory
        mode: "0755"
    - name: "下载CNI插件"
      ansible.builtin.get_url:
        url: "{{ kubernetes_cni_plugins_url_on_linux }}"
        dest: "{{ kubernetes_cni_plugins_path_on_linux }}"
        force: false
        mode: "0644"
      when: common_is_linux_os and not kubernetes_cni_plugins_stat.stat.exists

    - name: "解压CNI插件"
      ansible.builtin.unarchive:
        src: "{{ kubernetes_cni_plugins_path_on_linux }}"
        dest: "{{ kubernetes_cni_plugins_director_on_linux }}"
        remote_src: true
