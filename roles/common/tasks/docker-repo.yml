---
# 公共模块：配置 Docker / containerd 软件源
# 适用于 Ubuntu (APT) 和 CentOS (YUM)
# 支持通过变量指定镜像源地址，默认使用阿里云镜像（国内网络优化）

# 变量说明（可在上层 role 的 defaults/main.yml 中覆盖）：
#   common_docker_apt_mirror: Ubuntu APT 源地址
#     default: "https://mirrors.aliyun.com/docker-ce/linux/ubuntu"
#   common_docker_yum_mirror: CentOS YUM 源地址
#     default: "https://mirrors.aliyun.com/docker-ce/linux/centos"
#   common_docker_gpg_url: Docker GPG 密钥地址
#     default: "https://download.docker.com/linux/ubuntu/gpg"

- name: "Ubuntu 安装 ca-certificates curl"
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
  tags:
    - docker_repo
  when: common_is_ubuntu_os

- name: "Ubuntu 添加 Docker GPG 密钥"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      install -m 0755 -d /etc/apt/keyrings
      rm -f /etc/apt/keyrings/docker.gpg
      curl -fsSL {{ common_docker_gpg_url | default('https://download.docker.com/linux/ubuntu/gpg') }} | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    executable: /bin/bash
  changed_when: false
  tags:
    - docker_repo
  when: common_is_ubuntu_os

- name: "Ubuntu 添加 Docker APT 源"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] {{ common_docker_apt_mirror | default('https://mirrors.aliyun.com/docker-ce/linux/ubuntu') }} $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      apt-get update
  args:
    executable: /bin/bash
  changed_when: false
  tags:
    - docker_repo
  when: common_is_ubuntu_os

- name: "CentOS 添加 Docker YUM 源"
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable
    baseurl: "{{ common_docker_yum_mirror | default('https://mirrors.aliyun.com/docker-ce/linux/centos') }}/$releasever/$basearch/stable"
    gpgkey: "{{ common_docker_yum_mirror | default('https://mirrors.aliyun.com/docker-ce/linux/centos') }}/gpg"
    gpgcheck: true
    enabled: true
  tags:
    - docker_repo
  when: common_is_centos_os
